<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu Disponible</title>
<link rel="stylesheet" href="menu.css">
</head>

<body>

<header class="menu-header">
    <div class="brand">
        <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24">
                <path d="M4 5.5A2.5 2.5 0 0 1 6.5 3h11A2.5 2.5 0 0 1 20 5.5v13A2.5 2.5 0 0 1 17.5 21h-11A2.5 2.5 0 0 1 4 18.5v-13Z"></path>
                <path d="M8 7h8M8 11h8M8 15h5"></path>
            </svg>
        </div>
        <div>
            <strong>Sistema Caja</strong>
            <span>Catalogo conectado al inventario</span>
        </div>
    </div>
</header>

<main class="menu-shell">
    <section class="hero">
        <div class="hero-copy">
            <span class="eyebrow">Stock actualizado</span>
            <h1>Menu Disponible</h1>
            <p>Consulta los productos existentes y su disponibilidad actual.</p>
        </div>

        <div class="search-panel">
            <label for="busqueda">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="11" cy="11" r="7"></circle>
                    <path d="m20 20-3.2-3.2"></path>
                </svg>
                <input id="busqueda" type="search" placeholder="Buscar producto..." autocomplete="off">
            </label>
            <div class="stock-summary" id="resumenStock">0 productos</div>
        </div>
    </section>

    <section class="catalog-section">
        <div class="section-title">
            <h2>Productos</h2>
            <span id="contadorProductos">Inventario actual</span>
        </div>

        <div id="menuProductos" class="product-grid"></div>
    </section>
</main>

<script src="menu.js"></script>

</body>
</html>
